<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #07070B;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  perspective: 1000px; /* For 3D tilt effect */
}

/* ===== THE GOD-TIER BACKGROUND ===== */
.background {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: 
    radial-gradient(ellipse at 20% 50%, #7C3AED15 0%, transparent 50%),
    radial-gradient(ellipse at 80% 50%, #06B6D415 0%, transparent 50%),
    radial-gradient(ellipse at 50% 100%, #EC489910 0%, transparent 40%),
    #07070B;
}

/* === FLOATING ORB 1 - Teal Giant === */
.orb-1 {
  position: absolute;
  width: 60vmin;
  height: 60vmin;
  top: 20%;
  left: -10%;
  background: radial-gradient(circle, #06B6D430 0%, transparent 70%);
  filter: blur(80px);
  border-radius: 50%;
  animation: floatOrb1 20s ease-in-out infinite;
}

/* === FLOATING ORB 2 - Purple Beast === */
.orb-2 {
  position: absolute;
  width: 50vmin;
  height: 50vmin;
  bottom: 10%;
  right: -10%;
  background: radial-gradient(circle, #7C3AED35 0%, transparent 70%);
  filter: blur(70px);
  border-radius: 50%;
  animation: floatOrb2 25s ease-in-out infinite;
}

/* === FLOATING ORB 3 - Pink Diamond === */
.orb-3 {
  position: absolute;
  width: 30vmin;
  height: 30vmin;
  top: 50%;
  right: 20%;
  background: radial-gradient(circle, #EC489920 0%, transparent 70%);
  filter: blur(60px);
  border-radius: 50%;
  animation: floatOrb3 18s ease-in-out infinite;
}

/* === FLOATING ORB 4 - Gold Core === */
.orb-4 {
  position: absolute;
  width: 20vmin;
  height: 20vmin;
  bottom: 30%;
  left: 25%;
  background: radial-gradient(circle, #F59E0B20 0%, transparent 70%);
  filter: blur(50px);
  border-radius: 50%;
  animation: floatOrb4 15s ease-in-out infinite;
}

/* === AURORA WAVE (Bottom) === */
.aurora {
  position: absolute;
  bottom: -10%;
  left: -20%;
  width: 140%;
  height: 40%;
  background: 
    linear-gradient(180deg, transparent 0%, #7C3AED10 30%, #06B6D415 60%, transparent 100%);
  filter: blur(60px);
  animation: auroraWave 30s ease-in-out infinite;
}

/* === SPARKLE PARTICLES (Pure CSS) === */
.particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.particle {
  position: absolute;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  opacity: 0;
  animation: twinkle var(--duration) ease-in-out infinite;
  animation-delay: var(--delay);
}

.particle:nth-child(1) { top: 10%; left: 20%; --duration: 4s; --delay: 0s; }
.particle:nth-child(2) { top: 30%; left: 80%; --duration: 5s; --delay: 1s; }
.particle:nth-child(3) { top: 60%; left: 10%; --duration: 3.5s; --delay: 0.5s; }
.particle:nth-child(4) { top: 80%; left: 70%; --duration: 6s; --delay: 2s; }
.particle:nth-child(5) { top: 15%; left: 50%; --duration: 4.5s; --delay: 1.5s; }
.particle:nth-child(6) { top: 45%; left: 90%; --duration: 3s; --delay: 0.2s; }
.particle:nth-child(7) { top: 70%; left: 30%; --duration: 5.5s; --delay: 0.8s; }
.particle:nth-child(8) { top: 25%; left: 40%; --duration: 4.2s; --delay: 2.5s; }
.particle:nth-child(9) { top: 90%; left: 50%; --duration: 3.8s; --delay: 1.2s; }
.particle:nth-child(10) { top: 5%; left: 75%; --duration: 5.2s; --delay: 0.3s; }
.particle:nth-child(11) { top: 50%; left: 5%; --duration: 4.8s; --delay: 1.8s; }
.particle:nth-child(12) { top: 35%; left: 60%; --duration: 3.2s; --delay: 0.7s; }
.particle:nth-child(13) { top: 75%; left: 85%; --duration: 6.5s; --delay: 2.2s; }
.particle:nth-child(14) { top: 55%; left: 35%; --duration: 4.1s; --delay: 1.1s; }
.particle:nth-child(15) { top: 18%; left: 15%; --duration: 5.8s; --delay: 0.9s; }

/* === VIGNETTE (Cinema Quality) === */
.vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
  pointer-events: none;
  z-index: 2;
}

/* ===== 3D TILT CONTAINER ===== */
.tilt-container {
  position: relative;
  z-index: 10;
  transform-style: preserve-3d;
  transition: transform 0.1s ease-out;
  width: 100%;
  max-width: 420px;
  margin: 20px;
}

/* === GLASS CARD (The Login Form) === */
.login-card {
  width: 100%;
  padding: clamp(32px, 5vw, 56px);
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: clamp(20px, 3vw, 32px);
  box-shadow: 
    0 30px 80px -20px rgba(0,0,0,0.8),
    inset 0 1px 0 rgba(255,255,255,0.05);
  animation: cardFade 1.5s ease-out;
  transform-style: preserve-3d;
}

/* === SHIMMER EFFECT ON CARD (Extra Premium) === */
.login-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: clamp(20px, 3vw, 32px);
  padding: 1px;
  background: linear-gradient(135deg, 
    rgba(6, 182, 212, 0.3), 
    rgba(124, 58, 237, 0.3),
    rgba(236, 72, 153, 0.3),
    rgba(6, 182, 212, 0.3)
  );
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
  background-size: 300% 300%;
  animation: shimmerBorder 6s ease-in-out infinite;
}

.login-card h2 {
  color: rgba(255,255,255,0.9);
  font-size: clamp(24px, 3vw, 32px);
  font-weight: 600;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}

.login-card p {
  color: rgba(255,255,255,0.4);
  font-size: 14px;
  margin-bottom: 32px;
}

/* === INPUT WRAPPER (For password toggle) === */
.input-wrapper {
  position: relative;
  width: 100%;
  margin-bottom: 16px;
}

.input-wrapper input {
  width: 100%;
  padding: 16px 50px 16px 20px; /* Extra right padding for toggle button */
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  color: white;
  font-size: 16px;
  transition: all 0.3s;
  backdrop-filter: blur(10px);
}

.input-wrapper input:focus {
  outline: none;
  border-color: rgba(6, 182, 212, 0.4);
  background: rgba(255,255,255,0.08);
  box-shadow: 0 0 30px rgba(6, 182, 212, 0.05);
}

.input-wrapper input::placeholder {
  color: rgba(255,255,255,0.25);
}

/* === SHOW/HIDE PASSWORD TOGGLE === */
.toggle-password {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: rgba(255,255,255,0.3);
  cursor: pointer;
  padding: 4px;
  transition: all 0.3s;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.toggle-password:hover {
  color: rgba(255,255,255,0.7);
}

.toggle-password svg {
  width: 20px;
  height: 20px;
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* === ERROR STATE (Red Glow) === */
.input-wrapper.error input {
  border-color: rgba(239, 68, 68, 0.6);
  background: rgba(239, 68, 68, 0.08);
  box-shadow: 0 0 30px rgba(239, 68, 68, 0.15), inset 0 0 30px rgba(239, 68, 68, 0.05);
  animation: errorShake 0.5s ease-in-out;
}

.input-wrapper.error .toggle-password {
  color: rgba(239, 68, 68, 0.5);
}

/* === ERROR MESSAGE === */
.error-message {
  color: rgba(239, 68, 68, 0.8);
  font-size: 12px;
  margin-top: -10px;
  margin-bottom: 16px;
  padding-left: 4px;
  opacity: 0;
  transform: translateY(-10px);
  transition: all 0.3s;
  height: 0;
  overflow: hidden;
}

.error-message.show {
  opacity: 1;
  transform: translateY(0);
  height: 20px;
}

/* === LOGIN BUTTON === */
.login-card button {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #06B6D4, #7C3AED);
  border: none;
  border-radius: 12px;
  color: white;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
  margin-top: 8px;
}

.login-card button:hover {
  transform: scale(1.02);
  box-shadow: 0 10px 40px rgba(6, 182, 212, 0.3);
}

.login-card button:active {
  transform: scale(0.98);
}

.login-card button::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.1) 100%);
  pointer-events: none;
}

/* === BUTTON LOADING STATE === */
.login-card button.loading {
  pointer-events: none;
  opacity: 0.7;
}

.login-card button.loading .btn-text {
  visibility: hidden;
}

.login-card button.loading::before {
  content: '';
  position: absolute;
  width: 20px;
  height: 20px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
}

/* ===== ANIMATIONS ===== */

@keyframes floatOrb1 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(10%, -15%) scale(1.1); }
  66% { transform: translate(-5%, 10%) scale(0.9); }
}

@keyframes floatOrb2 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(-15%, -10%) scale(1.15); }
}

@keyframes floatOrb3 {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  50% { transform: translate(-10%, -20%) rotate(180deg); }
}

@keyframes floatOrb4 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(5%, -10%) scale(1.2); }
  75% { transform: translate(-5%, 5%) scale(0.8); }
}

@keyframes auroraWave {
  0%, 100% { transform: translateX(-10%) scaleY(1); opacity: 0.6; }
  50% { transform: translateX(10%) scaleY(1.3); opacity: 1; }
}

@keyframes twinkle {
  0%, 100% { opacity: 0; transform: scale(0.5); }
  50% { opacity: 0.8; transform: scale(1.2); }
}

@keyframes cardFade {
  0% { opacity: 0; transform: translateY(30px) scale(0.95); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes errorShake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-10px); }
  40% { transform: translateX(10px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}

@keyframes shimmerBorder {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

@keyframes spin {
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 480px) {
  .orb-1 { width: 80vmin; height: 80vmin; top: -20%; left: -30%; }
  .orb-2 { width: 60vmin; height: 60vmin; bottom: -10%; right: -30%; }
  .orb-3 { width: 40vmin; height: 40vmin; top: 40%; right: -10%; }
  .orb-4 { width: 30vmin; height: 30vmin; bottom: 20%; left: -10%; }
  .aurora { height: 30%; bottom: -5%; }
  .tilt-container { margin: 12px; }
}
</style>
</head>
<body>

<!-- ===== THE BACKGROUND ===== -->
<div class="background">
  <div class="orb-1"></div>
  <div class="orb-2"></div>
  <div class="orb-3"></div>
  <div class="orb-4"></div>
  <div class="aurora"></div>
  
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>
  
  <div class="vignette"></div>
</div>

<!-- ===== 3D TILT CONTAINER ===== -->
<div class="tilt-container" id="tiltContainer">
  
  <!-- ===== LOGIN CARD ===== -->
  <div class="login-card">
    <h2>Welcome Back</h2>
    <p>Sign in to continue your premium experience</p>
    
    <!-- Email Input -->
    <div class="input-wrapper">
      <input type="email" id="emailInput" placeholder="Email address" autocomplete="email" />
    </div>
    
    <!-- Password Input with Toggle -->
    <div class="input-wrapper" id="passwordWrapper">
      <input type="password" id="passwordInput" placeholder="Password" autocomplete="current-password" />
      <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
        <!-- Eye Icon (SVG) -->
        <svg viewBox="0 0 24 24" id="eyeIcon">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
      </button>
    </div>
    
    <!-- Error Message -->
    <div class="error-message" id="errorMessage">
      ⚠️ Invalid email or password. Please try again.
    </div>
    
    <button id="loginButton">
      <span class="btn-text">Sign In</span>
    </button>
  </div>
</div>

<script>
// ============================================
// 1. SHOW/HIDE PASSWORD TOGGLE
// ============================================
const passwordInput = document.getElementById('passwordInput');
const toggleBtn = document.getElementById('togglePassword');
const eyeIcon = document.getElementById('eyeIcon');

toggleBtn.addEventListener('click', function() {
  const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
  passwordInput.setAttribute('type', type);
  
  // Toggle eye icon
  if (type === 'text') {
    // Eye with slash (hidden)
    eyeIcon.innerHTML = `
      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
      <line x1="1" y1="1" x2="23" y2="23" />
    `;
  } else {
    // Regular eye
    eyeIcon.innerHTML = `
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
      <circle cx="12" cy="12" r="3" />
    `;
  }
});

// ============================================
// 2. RED GLOW ON WRONG PASSWORD (with demo)
// ============================================
const loginButton = document.getElementById('loginButton');
const emailInput = document.getElementById('emailInput');
const passwordWrapper = document.getElementById('passwordWrapper');
const errorMessage = document.getElementById('errorMessage');

// Demo: Click login to test error state
loginButton.addEventListener('click', function(e) {
  e.preventDefault();
  
  // Show loading state
  this.classList.add('loading');
  
  // Simulate API call
  setTimeout(() => {
    this.classList.remove('loading');
    
    // Demo: If email is empty OR password is less than 3 chars -> show error
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();
    
    if (email === '' || password === '' || password.length < 3) {
      // Show error on password field
      passwordWrapper.classList.add('error');
      errorMessage.classList.add('show');
      
      // Remove error after 3 seconds (or user can type to clear)
      setTimeout(() => {
        passwordWrapper.classList.remove('error');
        errorMessage.classList.remove('show');
      }, 3000);
    } else {
      // Success! Remove any errors
      passwordWrapper.classList.remove('error');
      errorMessage.classList.remove('show');
      
      // Show success feedback
      const btnText = this.querySelector('.btn-text');
      btnText.textContent = '✅ Welcome!';
      setTimeout(() => {
        btnText.textContent = 'Sign In';
      }, 2000);
    }
  }, 1500);
});

// Clear error when user types
passwordInput.addEventListener('input', function() {
  passwordWrapper.classList.remove('error');
  errorMessage.classList.remove('show');
});

emailInput.addEventListener('input', function() {
  passwordWrapper.classList.remove('error');
  errorMessage.classList.remove('show');
});

// ============================================
// 3. 3D TILT EFFECT ON MOUSE MOVE
// ============================================
const tiltContainer = document.getElementById('tiltContainer');
const loginCard = document.querySelector('.login-card');

tiltContainer.addEventListener('mousemove', function(e) {
  // Get mouse position relative to container
  const rect = this.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  
  // Calculate percentage (0 to 1)
  const xPercent = x / rect.width;
  const yPercent = y / rect.height;
  
  // Calculate rotation (max ±8 degrees)
  const maxRotate = 8;
  const rotateX = (yPercent - 0.5) * -maxRotate * 2;
  const rotateY = (xPercent - 0.5) * maxRotate * 2;
  
  // Apply 3D transform
  this.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
  
  // Add subtle shadow shift
  const shadowX = (xPercent - 0.5) * 20;
  const shadowY = (yPercent - 0.5) * 20;
  loginCard.style.boxShadow = `
    0 30px 80px -20px rgba(0,0,0,0.8),
    ${shadowX}px ${shadowY}px 60px -20px rgba(6, 182, 212, 0.15),
    inset 0 1px 0 rgba(255,255,255,0.05)
  `;
});

// Reset tilt when mouse leaves
tiltContainer.addEventListener('mouseleave', function() {
  this.style.transform = 'rotateX(0deg) rotateY(0deg)';
  loginCard.style.boxShadow = `
    0 30px 80px -20px rgba(0,0,0,0.8),
    inset 0 1px 0 rgba(255,255,255,0.05)
  `;
});

// ============================================
// 4. KEYBOARD SHORTCUT: Press Enter to login
// ============================================
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const active = document.activeElement;
    if (active === emailInput || active === passwordInput) {
      loginButton.click();
    }
  }
});
</script>

</body>
</html>
