<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #07070B;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  perspective: 1000px;
  transition: background 0.5s ease;
}

/* Light theme */
body.light {
  background: #F0F0F0;
}

body.light .login-card {
  background: rgba(255, 255, 255, 0.7);
  border: 1px solid rgba(0, 0, 0, 0.08);
}

body.light .login-card h2 { color: #1a1a2e; }
body.light .login-card p { color: rgba(0,0,0,0.5); }
body.light .input-wrapper input {
  background: rgba(0,0,0,0.05);
  color: #1a1a2e;
  border-color: rgba(0,0,0,0.08);
}
body.light .input-wrapper input::placeholder { color: rgba(0,0,0,0.3); }
body.light .eye-toggle { color: rgba(0,0,0,0.4); }
body.light .eye-toggle:hover { color: rgba(0,0,0,0.7); }
body.light .tab-btn { color: rgba(0,0,0,0.4); }
body.light .tab-btn.active { color: #1a1a2e; border-bottom-color: #7C3AED; }
body.light .vignette { background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.05) 100%); }

/* ===== BACKGROUND ===== */
.background {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: 
    radial-gradient(ellipse at 20% 50%, #7C3AED15 0%, transparent 50%),
    radial-gradient(ellipse at 80% 50%, #06B6D415 0%, transparent 50%),
    radial-gradient(ellipse at 50% 100%, #EC489910 0%, transparent 40%),
    #07070B;
}

.orb-1 {
  position: absolute;
  width: 60vmin;
  height: 60vmin;
  top: 20%;
  left: -10%;
  background: radial-gradient(circle, #06B6D430 0%, transparent 70%);
  filter: blur(80px);
  border-radius: 50%;
  animation: floatOrb1 20s ease-in-out infinite;
}

.orb-2 {
  position: absolute;
  width: 50vmin;
  height: 50vmin;
  bottom: 10%;
  right: -10%;
  background: radial-gradient(circle, #7C3AED35 0%, transparent 70%);
  filter: blur(70px);
  border-radius: 50%;
  animation: floatOrb2 25s ease-in-out infinite;
}

.orb-3 {
  position: absolute;
  width: 30vmin;
  height: 30vmin;
  top: 50%;
  right: 20%;
  background: radial-gradient(circle, #EC489920 0%, transparent 70%);
  filter: blur(60px);
  border-radius: 50%;
  animation: floatOrb3 18s ease-in-out infinite;
}

.orb-4 {
  position: absolute;
  width: 20vmin;
  height: 20vmin;
  bottom: 30%;
  left: 25%;
  background: radial-gradient(circle, #F59E0B20 0%, transparent 70%);
  filter: blur(50px);
  border-radius: 50%;
  animation: floatOrb4 15s ease-in-out infinite;
}

.aurora {
  position: absolute;
  bottom: -10%;
  left: -20%;
  width: 140%;
  height: 40%;
  background: 
    linear-gradient(180deg, transparent 0%, #7C3AED10 30%, #06B6D415 60%, transparent 100%);
  filter: blur(60px);
  animation: auroraWave 30s ease-in-out infinite;
}

.particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.particle {
  position: absolute;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  opacity: 0;
  animation: twinkle var(--duration) ease-in-out infinite;
  animation-delay: var(--delay);
}

.particle:nth-child(1) { top: 10%; left: 20%; --duration: 4s; --delay: 0s; }
.particle:nth-child(2) { top: 30%; left: 80%; --duration: 5s; --delay: 1s; }
.particle:nth-child(3) { top: 60%; left: 10%; --duration: 3.5s; --delay: 0.5s; }
.particle:nth-child(4) { top: 80%; left: 70%; --duration: 6s; --delay: 2s; }
.particle:nth-child(5) { top: 15%; left: 50%; --duration: 4.5s; --delay: 1.5s; }
.particle:nth-child(6) { top: 45%; left: 90%; --duration: 3s; --delay: 0.2s; }
.particle:nth-child(7) { top: 70%; left: 30%; --duration: 5.5s; --delay: 0.8s; }
.particle:nth-child(8) { top: 25%; left: 40%; --duration: 4.2s; --delay: 2.5s; }
.particle:nth-child(9) { top: 90%; left: 50%; --duration: 3.8s; --delay: 1.2s; }
.particle:nth-child(10) { top: 5%; left: 75%; --duration: 5.2s; --delay: 0.3s; }
.particle:nth-child(11) { top: 50%; left: 5%; --duration: 4.8s; --delay: 1.8s; }
.particle:nth-child(12) { top: 35%; left: 60%; --duration: 3.2s; --delay: 0.7s; }
.particle:nth-child(13) { top: 75%; left: 85%; --duration: 6.5s; --delay: 2.2s; }
.particle:nth-child(14) { top: 55%; left: 35%; --duration: 4.1s; --delay: 1.1s; }
.particle:nth-child(15) { top: 18%; left: 15%; --duration: 5.8s; --delay: 0.9s; }

.vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
  pointer-events: none;
  z-index: 2;
  transition: background 0.5s ease;
}

/* ===== 3D TILT CONTAINER ===== */
.tilt-container {
  position: relative;
  z-index: 10;
  transform-style: preserve-3d;
  transition: transform 0.1s ease-out;
  width: 100%;
  max-width: 420px;
  margin: 20px;
}

/* === GLASS CARD === */
.login-card {
  width: 100%;
  padding: clamp(32px, 5vw, 56px);
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: clamp(20px, 3vw, 32px);
  box-shadow: 
    0 30px 80px -20px rgba(0,0,0,0.8),
    inset 0 1px 0 rgba(255,255,255,0.05);
  animation: cardFade 1.5s ease-out;
  transform-style: preserve-3d;
  transition: background 0.5s ease, border 0.5s ease;
}

.login-card::before {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: clamp(20px, 3vw, 32px);
  background: linear-gradient(135deg, 
    rgba(6, 182, 212, 0.3), 
    rgba(124, 58, 237, 0.3),
    rgba(236, 72, 153, 0.3),
    rgba(6, 182, 212, 0.3)
  );
  background-size: 300% 300%;
  animation: shimmerBorder 6s ease-in-out infinite;
  z-index: -1;
  pointer-events: none;
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  padding: 1px;
}

/* ===== THEME TOGGLE (Item 14) ===== */
.theme-toggle {
  position: absolute;
  top: 20px;
  right: 20px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 50%;
  width: 40px;
  height: 40px;
  color: white;
  cursor: pointer;
  backdrop-filter: blur(10px);
  transition: all 0.3s;
  font-size: 18px;
  z-index: 20;
}

body.light .theme-toggle {
  background: rgba(0,0,0,0.05);
  border-color: rgba(0,0,0,0.08);
  color: #1a1a2e;
}

.theme-toggle:hover {
  transform: scale(1.1) rotate(20deg);
}

/* ===== TABS: Sign In / Sign Up ===== */
.tabs {
  display: flex;
  gap: 24px;
  margin-bottom: 28px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding-bottom: 12px;
}

.tab-btn {
  background: none;
  border: none;
  color: rgba(255,255,255,0.4);
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  padding: 4px 0;
  transition: all 0.3s;
  position: relative;
}

.tab-btn.active {
  color: rgba(255,255,255,0.9);
}

.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: -13px;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, #06B6D4, #7C3AED);
  border-radius: 2px;
}

.tab-btn:hover {
  color: rgba(255,255,255,0.7);
}

body.light .tab-btn { color: rgba(0,0,0,0.4); }
body.light .tab-btn.active { color: #1a1a2e; }
body.light .tab-btn.active::after { background: linear-gradient(90deg, #06B6D4, #7C3AED); }

.login-card h2 {
  color: rgba(255,255,255,0.9);
  font-size: clamp(24px, 3vw, 32px);
  font-weight: 600;
  margin-bottom: 4px;
  letter-spacing: -0.5px;
  transition: color 0.5s ease;
}

.login-card .subtitle {
  color: rgba(255,255,255,0.4);
  font-size: 14px;
  margin-bottom: 32px;
  transition: color 0.5s ease;
}

/* ===== INPUT WRAPPER ===== */
.input-wrapper {
  position: relative;
  width: 100%;
  margin-bottom: 16px;
}

.input-wrapper input {
  width: 100%;
  padding: 16px 48px 16px 20px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  color: white;
  font-size: 16px;
  transition: all 0.3s;
  backdrop-filter: blur(10px);
}

.input-wrapper input:focus {
  outline: none;
  border-color: rgba(6, 182, 212, 0.4);
  background: rgba(255,255,255,0.08);
  box-shadow: 0 0 30px rgba(6, 182, 212, 0.05);
}

.input-wrapper input::placeholder {
  color: rgba(255,255,255,0.25);
  transition: all 0.3s;
}

.input-wrapper input:focus::placeholder {
  opacity: 0.5;
  transform: translateX(5px);
}

/* Kill browser default eye */
.input-wrapper input[type="password"]::-ms-reveal,
.input-wrapper input[type="password"]::-webkit-clear-button,
.input-wrapper input[type="password"]::-webkit-credentials-auto-fill-button {
  display: none !important;
  visibility: hidden !important;
  opacity: 0 !important;
  pointer-events: none !important;
  width: 0 !important;
  height: 0 !important;
}

.input-wrapper input::-ms-clear,
.input-wrapper input::-ms-reveal {
  display: none !important;
  width: 0 !important;
  height: 0 !important;
}

/* ===== CUSTOM EYE ===== */
.eye-toggle {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  width: 24px;
  height: 24px;
  cursor: pointer;
  color: rgba(255,255,255,0.35);
  transition: all 0.3s;
  background: transparent;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  z-index: 5;
}

.eye-toggle:hover {
  color: rgba(255,255,255,0.7);
  transform: translateY(-50%) scale(1.1);
}

.eye-toggle:active {
  transform: translateY(-50%) scale(0.9);
}

.eye-toggle svg {
  width: 22px;
  height: 22px;
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.eye-toggle:hover svg {
  transform: scale(1.1);
}

/* ===== ERROR STATE (Item 11) ===== */
.input-wrapper.error input {
  border-color: rgba(239, 68, 68, 0.6);
  background: rgba(239, 68, 68, 0.08);
  box-shadow: 0 0 30px rgba(239, 68, 68, 0.15), inset 0 0 30px rgba(239, 68, 68, 0.05);
  animation: errorShake 0.5s ease-in-out;
}

.error-message {
  color: rgba(239, 68, 68, 0.8);
  font-size: 12px;
  margin-top: -10px;
  margin-bottom: 16px;
  padding-left: 4px;
  opacity: 0;
  transform: translateY(-10px);
  transition: all 0.3s;
  height: 0;
  overflow: hidden;
}

.error-message.show {
  opacity: 1;
  transform: translateY(0);
  height: 20px;
}

/* ===== LOGIN BUTTON ===== */
.login-card button[type="submit"] {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #06B6D4, #7C3AED);
  border: none;
  border-radius: 12px;
  color: white;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
  margin-top: 8px;
}

.login-card button[type="submit"]:hover {
  transform: scale(1.02);
  box-shadow: 0 10px 40px rgba(6, 182, 212, 0.3);
}

.login-card button[type="submit"]:active {
  transform: scale(0.98);
}

.login-card button[type="submit"].loading {
  pointer-events: none;
  opacity: 0.7;
}

.login-card button[type="submit"].loading .btn-text {
  visibility: hidden;
}

.login-card button[type="submit"].loading::before {
  content: '';
  position: absolute;
  width: 20px;
  height: 20px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
}

/* ===== SUCCESS STATE ===== */
.login-card button[type="submit"].success {
  background: linear-gradient(135deg, #10B981, #059669) !important;
}

.login-card button[type="submit"].success svg {
  animation: successPop 0.5s ease;
}

/* ===== ANIMATIONS ===== */

@keyframes floatOrb1 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(10%, -15%) scale(1.1); }
  66% { transform: translate(-5%, 10%) scale(0.9); }
}

@keyframes floatOrb2 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(-15%, -10%) scale(1.15); }
}

@keyframes floatOrb3 {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  50% { transform: translate(-10%, -20%) rotate(180deg); }
}

@keyframes floatOrb4 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(5%, -10%) scale(1.2); }
  75% { transform: translate(-5%, 5%) scale(0.8); }
}

@keyframes auroraWave {
  0%, 100% { transform: translateX(-10%) scaleY(1); opacity: 0.6; }
  50% { transform: translateX(10%) scaleY(1.3); opacity: 1; }
}

@keyframes twinkle {
  0%, 100% { opacity: 0; transform: scale(0.5); }
  50% { opacity: 0.8; transform: scale(1.2); }
}

@keyframes cardFade {
  0% { opacity: 0; transform: translateY(30px) scale(0.95); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes errorShake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-10px); }
  40% { transform: translateX(10px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}

@keyframes shimmerBorder {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

@keyframes spin {
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

@keyframes successPop {
  0% { transform: scale(0); opacity: 0; }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); opacity: 1; }
}

/* ===== CUSTOM SCROLLBAR (Item 15) ===== */
::-webkit-scrollbar {
  width: 4px;
}

::-webkit-scrollbar-track {
  background: rgba(255,255,255,0.05);
  border-radius: 4px;
}

::-webkit-scrollbar-thumb {
  background: linear-gradient(135deg, #06B6D4, #7C3AED);
  border-radius: 4px;
}

body.light ::-webkit-scrollbar-track {
  background: rgba(0,0,0,0.05);
}

body.light ::-webkit-scrollbar-thumb {
  background: linear-gradient(135deg, #06B6D4, #7C3AED);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 480px) {
  .orb-1 { width: 80vmin; height: 80vmin; top: -20%; left: -30%; }
  .orb-2 { width: 60vmin; height: 60vmin; bottom: -10%; right: -30%; }
  .orb-3 { width: 40vmin; height: 40vmin; top: 40%; right: -10%; }
  .orb-4 { width: 30vmin; height: 30vmin; bottom: 20%; left: -10%; }
  .aurora { height: 30%; bottom: -5%; }
  .tilt-container { margin: 12px; }
  .input-wrapper input { padding: 14px 44px 14px 16px; font-size: 16px; }
  .eye-toggle { right: 12px; }
  .theme-toggle { width: 36px; height: 36px; font-size: 16px; top: 16px; right: 16px; }
}
</style>
</head>
<body>

<!-- ===== BACKGROUND ===== -->
<div class="background">
  <div class="orb-1"></div>
  <div class="orb-2"></div>
  <div class="orb-3"></div>
  <div class="orb-4"></div>
  <div class="aurora"></div>
  <div class="particles">
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  </div>
  <div class="vignette"></div>
</div>

<!-- ===== 3D TILT CARD ===== -->
<div class="tilt-container" id="tiltContainer">
  <div class="login-card">
    
    <!-- Theme Toggle (Item 14) -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      🌓
    </button>
    
    <!-- Tabs: Sign In / Sign Up -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="signin">Sign In</button>
      <button class="tab-btn" data-tab="signup">Sign Up</button>
    </div>
    
    <h2 id="formTitle">Welcome Back</h2>
    <p class="subtitle" id="formSubtitle">Sign in to continue your premium experience</p>
    
    <!-- Email Input -->
    <div class="input-wrapper">
      <input type="email" id="emailInput" placeholder="Email address" autocomplete="email" />
    </div>
    
    <!-- Password Input -->
    <div class="input-wrapper" id="passwordWrapper">
      <input type="password" id="passwordInput" placeholder="Password" autocomplete="current-password" />
      <button type="button" class="eye-toggle" id="eyeToggle" aria-label="Toggle password visibility">
        <svg viewBox="0 0 24 24" id="eyeIcon">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
      </button>
    </div>
    
    <!-- Error Message (Item 11 - auto dismiss) -->
    <div class="error-message" id="errorMessage">
      ⚠️ Invalid email or password. Please try again.
    </div>
    
    <!-- Sign Up extra field (hidden by default) -->
    <div class="input-wrapper" id="confirmWrapper" style="display:none;">
      <input type="password" id="confirmInput" placeholder="Confirm Password" />
    </div>
    
    <button type="submit" id="loginButton">
      <span class="btn-text">Sign In</span>
    </button>
  </div>
</div>

<script>
// ============================================
// 1. TABS: Sign In / Sign Up
// ============================================
const tabBtns = document.querySelectorAll('.tab-btn');
const formTitle = document.getElementById('formTitle');
const formSubtitle = document.getElementById('formSubtitle');
const loginButton = document.getElementById('loginButton');
const btnText = loginButton.querySelector('.btn-text');
const confirmWrapper = document.getElementById('confirmWrapper');

tabBtns.forEach(btn => {
  btn.addEventListener('click', function() {
    tabBtns.forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    
    const isSignUp = this.dataset.tab === 'signup';
    
    if (isSignUp) {
      formTitle.textContent = 'Create Account';
      formSubtitle.textContent = 'Join us and start your journey';
      btnText.textContent = 'Sign Up';
      confirmWrapper.style.display = 'block';
      document.getElementById('passwordInput').placeholder = 'Password';
    } else {
      formTitle.textContent = 'Welcome Back';
      formSubtitle.textContent = 'Sign in to continue your premium experience';
      btnText.textContent = 'Sign In';
      confirmWrapper.style.display = 'none';
      document.getElementById('passwordInput').placeholder = 'Password';
    }
    
    // Clear errors
    document.getElementById('passwordWrapper').classList.remove('error');
    document.getElementById('errorMessage').classList.remove('show');
  });
});

// ============================================
// 2. EYE TOGGLE
// ============================================
const passwordInput = document.getElementById('passwordInput');
const eyeToggle = document.getElementById('eyeToggle');
const eyeIcon = document.getElementById('eyeIcon');

eyeToggle.addEventListener('click', function(e) {
  e.preventDefault();
  e.stopPropagation();
  
  const isPassword = passwordInput.type === 'password';
  passwordInput.type = isPassword ? 'text' : 'password';
  
  if (isPassword) {
    eyeIcon.innerHTML = `
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
      <circle cx="12" cy="12" r="3" />
      <line x1="1" y1="1" x2="23" y2="23" />
    `;
  } else {
    eyeIcon.innerHTML = `
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
      <circle cx="12" cy="12" r="3" />
    `;
  }
});

// ============================================
// 3. LOGIN / SIGNUP LOGIC with AUTO-DISMISS (Item 11)
// ============================================
const emailInput = document.getElementById('emailInput');
const passwordWrapper = document.getElementById('passwordWrapper');
const errorMessage = document.getElementById('errorMessage');
const confirmInput = document.getElementById('confirmInput');
let errorTimeout = null;

loginButton.addEventListener('click', function(e) {
  e.preventDefault();
  
  // Clear previous error
  clearTimeout(errorTimeout);
  passwordWrapper.classList.remove('error');
  errorMessage.classList.remove('show');
  
  const isSignUp = document.querySelector('.tab-btn.active').dataset.tab === 'signup';
  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();
  const confirm = confirmInput.value.trim();
  
  // Validation
  let hasError = false;
  
  if (email === '') {
    hasError = true;
  }
  
  if (password === '' || password.length < 3) {
    hasError = true;
  }
  
  if (isSignUp && confirm !== password) {
    hasError = true;
    // Custom message for signup mismatch
    showError('⚠️ Passwords do not match. Please try again.');
    return;
  }
  
  if (hasError) {
    showError('⚠️ Invalid email or password. Please try again.');
    return;
  }
  
  // Success - loading state
  this.classList.add('loading');
  
  setTimeout(() => {
    this.classList.remove('loading');
    this.classList.add('success');
    
    // Success icon
    this.innerHTML = `
      <svg width="24" height="24" viewBox="0 0 24 24" style="margin: 0 auto;">
        <path d="M20 6L9 17l-5-5" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
      </svg>
    `;
    
    setTimeout(() => {
      this.classList.remove('success');
      this.innerHTML = `<span class="btn-text">${isSignUp ? 'Sign Up' : 'Sign In'}</span>`;
    }, 2000);
  }, 1500);
});

// Show error with auto-dismiss (Item 11 - 3 seconds)
function showError(message) {
  errorMessage.textContent = message;
  passwordWrapper.classList.add('error');
  errorMessage.classList.add('show');
  
  // Auto-dismiss after 3 seconds
  clearTimeout(errorTimeout);
  errorTimeout = setTimeout(() => {
    passwordWrapper.classList.remove('error');
    errorMessage.classList.remove('show');
  }, 3000);
}

// Clear error on input
passwordInput.addEventListener('input', function() {
  clearTimeout(errorTimeout);
  passwordWrapper.classList.remove('error');
  errorMessage.classList.remove('show');
});

emailInput.addEventListener('input', function() {
  clearTimeout(errorTimeout);
  passwordWrapper.classList.remove('error');
  errorMessage.classList.remove('show');
});

confirmInput.addEventListener('input', function() {
  clearTimeout(errorTimeout);
  passwordWrapper.classList.remove('error');
  errorMessage.classList.remove('show');
});

// ============================================
// 4. 3D TILT EFFECT (Item 12 - micro-interactions)
// ============================================
const tiltContainer = document.getElementById('tiltContainer');
const loginCard = document.querySelector('.login-card');

tiltContainer.addEventListener('mousemove', function(e) {
  const rect = this.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  
  const xPercent = x / rect.width;
  const yPercent = y / rect.height;
  
  const maxRotate = 8;
  const rotateX = (yPercent - 0.5) * -maxRotate * 2;
  const rotateY = (xPercent - 0.5) * maxRotate * 2;
  
  this.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
  
  const shadowX = (xPercent - 0.5) * 20;
  const shadowY = (yPercent - 0.5) * 20;
  loginCard.style.boxShadow = `
    0 30px 80px -20px rgba(0,0,0,0.8),
    ${shadowX}px ${shadowY}px 60px -20px rgba(6, 182, 212, 0.15),
    inset 0 1px 0 rgba(255,255,255,0.05)
  `;
});

tiltContainer.addEventListener('mouseleave', function() {
  this.style.transform = 'rotateX(0deg) rotateY(0deg)';
  loginCard.style.boxShadow = `
    0 30px 80px -20px rgba(0,0,0,0.8),
    inset 0 1px 0 rgba(255,255,255,0.05)
  `;
});

// ============================================
// 5. THEME TOGGLE (Item 14)
// ============================================
const themeToggle = document.getElementById('themeToggle');
let darkMode = true;

themeToggle.addEventListener('click', function() {
  darkMode = !darkMode;
  document.body.classList.toggle('light', !darkMode);
  this.textContent = darkMode ? '🌓' : '☀️';
});

// ============================================
// 6. KEYBOARD SHORTCUTS (Item 12)
// ============================================
document.addEventListener('keydown', function(e) {
  // Enter to submit
  if (e.key === 'Enter') {
    const active = document.activeElement;
    if (active === emailInput || active === passwordInput || active === confirmInput) {
      loginButton.click();
    }
  }
  
  // Escape to clear errors (Item 12)
  if (e.key === 'Escape') {
    clearTimeout(errorTimeout);
    passwordWrapper.classList.remove('error');
    errorMessage.classList.remove('show');
  }
});

// ============================================
// 7. AUTO-FOCUS (Item 12)
// ============================================
setTimeout(() => emailInput.focus(), 500);
</script>
