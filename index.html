<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body { min-height: 100vh; min-height: 100dvh; overflow-x: hidden; }

:root {
  --ink: #1A1815;
  --ink-soft: rgba(26,24,21,0.55);
  --ink-faint: rgba(26,24,21,0.35);
  --cream: #FAF8F3;
  --cream-panel: #FFFFFF;
  --gold: #A9814A;
  --gold-light: #C9A66B;
  --hairline: rgba(26,24,21,0.12);
  --error: #A23B2E;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: var(--cream);
  font-family: 'Times New Roman', Georgia, serif;
  padding: 24px;
  transition: background 0.6s ease;
  position: relative;
}

body.dark {
  --ink: #F2EEE6;
  --ink-soft: rgba(242,238,230,0.6);
  --ink-faint: rgba(242,238,230,0.4);
  --cream: #0C0B09;
  --cream-panel: #17150F;
  --gold: #C9A66B;
  --gold-light: #E4C892;
  --hairline: rgba(242,238,230,0.14);
  background: var(--cream);
}

/* ===== Ambient backdrop ===== */
.background {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse 60% 40% at 15% 10%, rgba(169,129,74,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 90% 90%, rgba(169,129,74,0.06) 0%, transparent 60%),
    var(--cream);
  transition: background 0.6s ease;
}
.background::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0.035;
  background-image: repeating-linear-gradient(135deg, var(--ink) 0px, var(--ink) 1px, transparent 1px, transparent 3px);
}

.stage {
  position: relative;
  z-index: 5;
  width: 100%;
  max-width: 408px;
}

/* ===== Card ===== */
.login-card {
  width: 100%;
  padding: 52px 44px 40px;
  background: var(--cream-panel);
  border: 1px solid var(--hairline);
  position: relative;
  box-shadow: 0 40px 80px -32px rgba(26,24,21,0.28);
  transition: background 0.6s ease, border-color 0.6s ease;
}

.login-card.card-enter { animation: cardFadeIn 0.7s cubic-bezier(0.16,1,0.3,1) forwards; }
.login-card.card-exit { animation: cardFadeOut 0.3s ease forwards; }

@keyframes cardFadeIn { 0% { opacity: 0; transform: translateY(18px); } 100% { opacity: 1; transform: translateY(0); } }
@keyframes cardFadeOut { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-10px); } }

/* corner ornaments — the signature detail */
.corner { position: absolute; width: 16px; height: 16px; border: 1px solid var(--gold); opacity: 0.8; }
.corner.tl { top: -1px; left: -1px; border-right: none; border-bottom: none; }
.corner.tr { top: -1px; right: -1px; border-left: none; border-bottom: none; }
.corner.bl { bottom: -1px; left: -1px; border-right: none; border-top: none; }
.corner.br { bottom: -1px; right: -1px; border-left: none; border-top: none; }

.theme-toggle {
  position: absolute;
  top: 20px;
  right: 20px;
  background: none;
  border: none;
  color: var(--ink-faint);
  cursor: pointer;
  font-size: 15px;
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.3s;
  z-index: 20;
  font-family: 'Times New Roman', Georgia, serif;
}
.theme-toggle:hover { color: var(--gold); }

/* ===== Crest logo ===== */
.crest {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 28px;
}
.crest-icon { width: 52px; height: 52px; margin-bottom: 14px; }
.crest-word {
  font-size: 22px;
  letter-spacing: 6px;
  color: var(--ink);
  text-transform: uppercase;
  transition: color 0.6s ease;
}
.crest-rule {
  width: 34px;
  height: 1px;
  background: var(--gold);
  margin-top: 12px;
}

/* ===== Tabs ===== */
.tabs {
  display: flex;
  justify-content: center;
  gap: 34px;
  margin: 30px 0 34px;
}
.tab-btn {
  background: none;
  border: none;
  color: var(--ink-faint);
  font-family: 'Times New Roman', Georgia, serif;
  font-size: 12.5px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  cursor: pointer;
  padding: 0 0 10px;
  position: relative;
  transition: color 0.3s;
}
.tab-btn.active { color: var(--ink); }
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0; right: 0;
  height: 1px;
  background: var(--gold);
}
.tab-btn:active { opacity: 0.7; }

.content-wrapper { transition: all 0.3s ease; text-align: center; }
.content-wrapper.slide-in { animation: slideIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
.content-wrapper.slide-out { animation: slideOut 0.22s ease forwards; }
@keyframes slideIn { 0% { opacity: 0; transform: translateY(6px); } 100% { opacity: 1; transform: translateY(0); } }
@keyframes slideOut { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-6px); } }

.login-card h2 {
  color: var(--ink);
  font-size: 25px;
  font-weight: normal;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
  transition: color 0.6s ease;
}
.login-card .subtitle {
  color: var(--ink-soft);
  font-size: 13px;
  font-style: italic;
  margin-bottom: 34px;
  letter-spacing: 0.3px;
}

/* ===== Underline inputs — the luxury-form detail ===== */
.input-wrapper { position: relative; width: 100%; margin-bottom: 26px; text-align: left; }

.field-label {
  display: block;
  font-size: 10.5px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 8px;
  transition: color 0.25s;
}
.input-wrapper.focused .field-label { color: var(--gold); }

.input-wrapper input {
  width: 100%;
  padding: 6px 30px 10px 0;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--hairline);
  color: var(--ink);
  font-family: 'Times New Roman', Georgia, serif;
  font-size: 16px;
  transition: border-color 0.3s;
}
.input-wrapper input:focus { outline: none; border-bottom-color: var(--gold); }
.input-wrapper input::placeholder { color: var(--ink-faint); opacity: 0.6; }

.input-wrapper input[type="password"]::-ms-reveal,
.input-wrapper input[type="password"]::-webkit-clear-button,
.input-wrapper input[type="password"]::-webkit-credentials-auto-fill-button {
  display: none !important; visibility: hidden !important; opacity: 0 !important;
  pointer-events: none !important; width: 0 !important; height: 0 !important;
}

.eye-toggle {
  position: absolute;
  right: 0;
  bottom: 8px;
  width: 18px; height: 18px;
  cursor: pointer;
  color: var(--ink-faint);
  background: transparent;
  border: none;
  display: flex; align-items: center; justify-content: center;
  padding: 0; z-index: 5;
  min-width: 36px; min-height: 36px;
  transform: translateX(8px);
}
.eye-toggle:hover { color: var(--gold); }
.eye-toggle svg { width: 17px; height: 17px; fill: none; stroke: currentColor; stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; }

.remember-forgot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: -8px 0 26px;
  flex-wrap: wrap;
  gap: 10px;
}
.remember-label {
  color: var(--ink-soft);
  font-size: 12.5px;
  letter-spacing: 0.5px;
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
}
.remember-label input[type="checkbox"] { accent-color: var(--gold); width: 13px; height: 13px; cursor: pointer; }
.forgot-link { color: var(--gold); font-size: 12.5px; letter-spacing: 0.5px; text-decoration: none; }
.forgot-link:hover { color: var(--ink); }

.divider {
  display: flex; align-items: center; gap: 16px;
  margin: 30px 0 22px;
  color: var(--ink-faint);
  font-size: 10.5px;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--hairline); }

.social-login { display: flex; gap: 10px; margin-bottom: 8px; }
.social-btn {
  flex: 1;
  padding: 12px;
  background: transparent;
  border: 1px solid var(--hairline);
  color: var(--ink);
  cursor: pointer;
  transition: all 0.3s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-family: 'Times New Roman', Georgia, serif;
  font-size: 12.5px;
  letter-spacing: 1px;
  min-height: 46px;
}
.social-btn:hover { border-color: var(--gold); color: var(--gold); }
.social-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

.input-wrapper.error input { border-bottom-color: var(--error); animation: errorShake 0.4s ease-in-out; }
.error-message {
  color: var(--error);
  font-size: 12px;
  letter-spacing: 0.3px;
  margin: -16px 0 20px;
  text-align: left;
  opacity: 0; transform: translateY(-4px);
  transition: all 0.3s;
  height: 0; overflow: hidden;
}
.error-message.show { opacity: 1; transform: translateY(0); height: 16px; }

.caps-warning {
  color: var(--gold);
  font-size: 12px;
  margin: -16px 0 12px;
  text-align: left;
  display: none;
}
.caps-warning.show { display: block; }

.login-card button[type="submit"] {
  width: 100%;
  padding: 16px;
  background: var(--ink);
  border: 1px solid var(--ink);
  color: var(--cream-panel);
  font-family: 'Times New Roman', Georgia, serif;
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.35s;
  position: relative;
  overflow: hidden;
  margin-top: 6px;
  min-height: 52px;
}
.login-card button[type="submit"]:hover { background: var(--gold); border-color: var(--gold); color: var(--ink); }
.login-card button[type="submit"]:active { transform: scale(0.99); }

.login-card button[type="submit"].loading { pointer-events: none; opacity: 0.75; }
.login-card button[type="submit"].loading .btn-text { visibility: hidden; }
.login-card button[type="submit"].loading::before {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  border: 1.5px solid rgba(250,248,243,0.35);
  border-top-color: var(--cream-panel);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
}
.login-card button[type="submit"].success { background: var(--gold) !important; border-color: var(--gold) !important; color: var(--ink) !important; }

@keyframes errorShake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); } 40% { transform: translateX(6px); }
  60% { transform: translateX(-3px); } 80% { transform: translateX(3px); }
}
@keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

.foot-note {
  text-align: center;
  margin-top: 26px;
  font-size: 11px;
  letter-spacing: 1.5px;
  color: var(--ink-faint);
  text-transform: uppercase;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gold); }

@media (max-width: 480px) {
  body { padding: 14px; }
  .login-card { padding: 40px 26px 32px; }
  .social-login { flex-direction: column; }
  .remember-forgot { flex-direction: column; align-items: flex-start; gap: 8px; }
  .input-wrapper input { font-size: 16px; }
  .crest-word { letter-spacing: 4px; font-size: 19px; }
}

@media (prefers-reduced-motion: reduce) {
  .login-card.card-enter, .login-card.card-exit,
  .content-wrapper.slide-in, .content-wrapper.slide-out { animation-duration: 0.01ms !important; }
}
</style>
</head>
<body>

<div class="background"></div>

<div class="stage">
  <div class="login-card card-enter" id="loginCard">
    <span class="corner tl"></span><span class="corner tr"></span>
    <span class="corner bl"></span><span class="corner br"></span>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">☾</button>

    <div class="crest">
      <svg class="crest-icon" viewBox="0 0 52 52" fill="none">
        <circle cx="26" cy="26" r="24.5" stroke="#A9814A" stroke-width="0.75"/>
        <circle cx="26" cy="26" r="19.5" stroke="#A9814A" stroke-width="0.5" opacity="0.6"/>
        <path d="M26 14 L34.5 30 L17.5 30 Z" stroke="#A9814A" stroke-width="1" fill="none"/>
        <circle cx="26" cy="24" r="1.6" fill="#A9814A"/>
      </svg>
      <span class="crest-word">Aurelia</span>
      <div class="crest-rule"></div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" id="signinTab">Sign In</button>
      <button class="tab-btn" id="signupTab">Register</button>
    </div>

    <div class="content-wrapper slide-in" id="contentWrapper">
      <h2 id="formTitle">Welcome Back</h2>
      <p class="subtitle" id="formSubtitle">Sign in to continue to your account</p>

      <div class="input-wrapper" id="emailWrapper">
        <label class="field-label">Email Address</label>
        <input type="email" id="emailInput" autocomplete="email" />
      </div>

      <div class="input-wrapper" id="passwordWrapper">
        <label class="field-label">Password</label>
        <input type="password" id="passwordInput" autocomplete="current-password" />
        <button type="button" class="eye-toggle" id="eyeToggle" aria-label="Toggle password visibility">
          <svg viewBox="0 0 24 24" id="eyeIcon">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </button>
      </div>

      <div class="caps-warning" id="capsWarning">Caps Lock is on</div>

      <div class="remember-forgot" id="rememberForgot">
        <label class="remember-label"><input type="checkbox" id="rememberMe" /> Remember me</label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <div class="error-message" id="errorMessage">Invalid email or password. Please try again.</div>

      <div class="input-wrapper" id="confirmWrapper" style="display:none;">
        <label class="field-label">Confirm Password</label>
        <input type="password" id="confirmInput" />
      </div>

      <div class="divider">Or Continue With</div>
      <div class="social-login">
        <button class="social-btn" id="googleBtn">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>
        <button class="social-btn" id="appleBtn">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M16.365 1.43c0 1.14-.468 2.107-1.404 2.9-1.028.85-2.146 1.35-3.245 1.257-.14-1.11.42-2.28 1.375-3.12.966-.86 2.24-1.35 3.274-1.037zM20.6 17.14c-.44 1.02-.66 1.47-1.24 2.37-.8 1.25-1.94 2.81-3.35 2.83-1.25.02-1.57-.82-3.27-.81-1.7.01-2.05.83-3.3.81-1.41-.02-2.5-1.42-3.3-2.67-2.27-3.53-2.5-7.68-1.1-9.9.99-1.58 2.56-2.5 4.03-2.5 1.5 0 2.44.83 3.68.83 1.2 0 1.94-.83 3.68-.83 1.31 0 2.7.71 3.68 1.94-3.24 1.78-2.72 6.4.3 7.93z"/></svg>
          Apple
        </button>
      </div>

      <button type="submit" id="loginButton">
        <span class="btn-text">Sign In</span>
      </button>

      <div class="foot-note">Est. Members Only</div>
    </div>
  </div>
</div>

<script>
const signinTab = document.getElementById('signinTab');
const signupTab = document.getElementById('signupTab');
const loginCard = document.getElementById('loginCard');
const contentWrapper = document.getElementById('contentWrapper');
const formTitle = document.getElementById('formTitle');
const formSubtitle = document.getElementById('formSubtitle');
const loginButton = document.getElementById('loginButton');
const btnText = loginButton.querySelector('.btn-text');
const confirmWrapper = document.getElementById('confirmWrapper');
const rememberForgot = document.getElementById('rememberForgot');
const emailInput = document.getElementById('emailInput');
const passwordInput = document.getElementById('passwordInput');
const confirmInput = document.getElementById('confirmInput');
let isAnimating = false;

function switchTab(tab) {
  if (isAnimating) return;
  isAnimating = true;
  const isSignUp = tab === 'signup';
  signinTab.classList.toggle('active', !isSignUp);
  signupTab.classList.toggle('active', isSignUp);
  loginCard.classList.remove('card-enter'); loginCard.classList.add('card-exit');
  contentWrapper.classList.remove('slide-in'); contentWrapper.classList.add('slide-out');

  setTimeout(() => {
    formTitle.textContent = isSignUp ? 'Create Account' : 'Welcome Back';
    formSubtitle.textContent = isSignUp ? 'Join us and become a member' : 'Sign in to continue to your account';
    btnText.textContent = isSignUp ? 'Register' : 'Sign In';
    confirmWrapper.style.display = isSignUp ? 'block' : 'none';
    rememberForgot.style.display = isSignUp ? 'none' : 'flex';
    document.getElementById('passwordWrapper').classList.remove('error');
    document.getElementById('errorMessage').classList.remove('show');
    loginCard.classList.remove('card-exit'); loginCard.classList.add('card-enter');
    contentWrapper.classList.remove('slide-out'); contentWrapper.classList.add('slide-in');
    setTimeout(() => { isAnimating = false; }, 400);
  }, 220);
}
signinTab.addEventListener('click', () => { if (!signinTab.classList.contains('active')) switchTab('signin'); });
signupTab.addEventListener('click', () => { if (!signupTab.classList.contains('active')) switchTab('signup'); });

const eyeToggle = document.getElementById('eyeToggle');
const eyeIcon = document.getElementById('eyeIcon');
eyeToggle.addEventListener('click', (e) => {
  e.preventDefault();
  const isPassword = passwordInput.type === 'password';
  passwordInput.type = isPassword ? 'text' : 'password';
  eyeIcon.innerHTML = isPassword
    ? `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" /><circle cx="12" cy="12" r="3" /><line x1="1" y1="1" x2="23" y2="23" />`
    : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" /><circle cx="12" cy="12" r="3" />`;
});

const capsWarning = document.getElementById('capsWarning');
passwordInput.addEventListener('keydown', (e) => capsWarning.classList.toggle('show', e.getModifierState('CapsLock')));
passwordInput.addEventListener('keyup', (e) => capsWarning.classList.toggle('show', e.getModifierState('CapsLock')));
passwordInput.addEventListener('blur', () => capsWarning.classList.remove('show'));

const passwordWrapper = document.getElementById('passwordWrapper');
const errorMessage = document.getElementById('errorMessage');
let errorTimeout = null;

function showError(message) {
  errorMessage.textContent = message;
  passwordWrapper.classList.add('error');
  errorMessage.classList.add('show');
  clearTimeout(errorTimeout);
  errorTimeout = setTimeout(() => { passwordWrapper.classList.remove('error'); errorMessage.classList.remove('show'); }, 3000);
}

loginButton.addEventListener('click', function(e) {
  e.preventDefault();
  clearTimeout(errorTimeout);
  passwordWrapper.classList.remove('error');
  errorMessage.classList.remove('show');

  const isSignUp = signupTab.classList.contains('active');
  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();
  const confirm = confirmInput.value.trim();

  if (isSignUp && confirm !== password) { showError('Passwords do not match. Please try again.'); return; }
  if (email === '' || password === '' || password.length < 3) { showError('Invalid email or password. Please try again.'); return; }

  this.classList.add('loading');
  setTimeout(() => {
    this.classList.remove('loading');
    this.classList.add('success');
    this.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" style="margin:0 auto;"><path d="M20 6L9 17l-5-5" stroke="#1A1815" stroke-width="3" fill="none" stroke-linecap="round"/></svg>`;
    setTimeout(() => {
      this.classList.remove('success');
      this.innerHTML = `<span class="btn-text">${isSignUp ? 'Register' : 'Sign In'}</span>`;
    }, 1800);
  }, 1200);
});

[passwordInput, emailInput, confirmInput].forEach(el => {
  el.addEventListener('input', () => {
    clearTimeout(errorTimeout);
    passwordWrapper.classList.remove('error');
    errorMessage.classList.remove('show');
  });
  el.addEventListener('focus', () => el.closest('.input-wrapper').classList.add('focused'));
  el.addEventListener('blur', () => el.closest('.input-wrapper').classList.remove('focused'));
});

const themeToggle = document.getElementById('themeToggle');
themeToggle.addEventListener('click', function() {
  const dark = document.body.classList.toggle('dark');
  this.textContent = dark ? '☀' : '☾';
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && [emailInput, passwordInput, confirmInput].includes(document.activeElement)) loginButton.click();
});

document.getElementById('googleBtn').addEventListener('click', () => alert('Google authentication coming soon!'));
document.getElementById('appleBtn').addEventListener('click', () => alert('Apple authentication coming soon!'));

const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
setTimeout(() => { if (!isMobile) emailInput.focus(); }, 400);
</script>

</body>
</html>
